# Atlas AI Telegram Bot - Render Deployment Configuration
# Deploy your bot to Render with ease using this configuration

services:
  - type: web
    name: atlas-ai-bot
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
        description: "Your Telegram Bot Token from @BotFather"
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Gemini API Key from AI Studio"
    autoDeploy: true
    region: oregon  # Choose your preferred region
    disk:
      name: atlas-ai-disk
      mountPath: /app/data
      sizeGB: 1
